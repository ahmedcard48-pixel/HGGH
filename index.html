<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECONOMINE</title>
    <script>
      // Fix for protobufjs / formdata-polyfill fetch override error
      // Some environments have fetch as a read-only property which causes formdata-polyfill to crash
      (function() {
        try {
          var target = window;
          var descriptor = Object.getOwnPropertyDescriptor(target, 'fetch');
          
          // If not on window, check prototype
          if (!descriptor) {
            target = Object.getPrototypeOf(window);
            descriptor = Object.getOwnPropertyDescriptor(target, 'fetch');
          }

          if (descriptor && descriptor.configurable) {
            var _fetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return _fetch; },
              set: function(v) { _fetch = v; },
              configurable: true,
              enumerable: true
            });
            console.log('Successfully patched window.fetch for polyfill compatibility');
          } else if (descriptor && !descriptor.configurable) {
            console.warn('window.fetch is not configurable, polyfills might fail');
          }
        } catch (e) {
          console.warn('Failed to patch fetch for polyfill compatibility:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
